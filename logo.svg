<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="rc-text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="rc-underline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#FAF9F6"/>

  <!-- Main wordmark: Rootcast -->
  <text
    x="256"
    y="278"
    font-family="'Inter','Helvetica Neue','Arial Black',sans-serif"
    font-weight="800"
    font-size="72"
    letter-spacing="-4"
    text-anchor="middle"
    fill="#1C1917"
  >Rootcast</text>

  <!-- Colored accent underline beneath the word -->
  <rect x="92" y="293" width="328" height="5" rx="2.5" fill="url(#rc-underline-grad)"/>

  <!-- Small dot accent above the 'o' in Root — colored teal circle -->
  <!-- Positioned roughly over the first 'o' -->
  <circle cx="191" cy="225" r="5" fill="#14B8A6"/>

  <!-- Tagline in monospace below -->
  <text
    x="256"
    y="340"
    font-family="'JetBrains Mono','Fira Mono','Courier New',monospace"
    font-weight="400"
    font-size="13"
    letter-spacing="1.5"
    text-anchor="middle"
    fill="#0D9488"
    opacity="0.85"
  >proof-of-attendance</text>

</svg>